<!DOCTYPE html>
<html>

<head>

<title>ACSE Department Library</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="login-body">

<div class="container text-center">

<img src="https://vignan.ac.in/images/logo.png" class="logo">

<h2 class="dept-title">ACSE DEPARTMENT LIBRARY</h2>

<div class="login-card">

<h4>Admin Login</h4>

<input id="username" class="form-control mt-3" placeholder="Username">

<input type="password" id="password" class="form-control mt-2" placeholder="Password">

<button class="btn btn-primary w-100 mt-3" onclick="login()">Login</button>

<p id="error" class="text-danger mt-2"></p>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
