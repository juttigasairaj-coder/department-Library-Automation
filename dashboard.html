<!DOCTYPE html>
<html>

<head>

<title>ACSE Library Dashboard</title>

<link rel="stylesheet" href="style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<span class="navbar-brand">ACSE Department Library</span>

<div>

<button class="btn btn-light me-2" onclick="history.back()">⬅ Go Back</button>

<button class="btn btn-light" onclick="history.forward()">Go Forward ➡</button>

</div>

</div>

</nav>

<div class="container mt-4">

<h4>Borrow Book</h4>

<div class="row g-2">

<div class="col-md-3">
<input id="facultyName" class="form-control" placeholder="Faculty Name">
</div>

<div class="col-md-3">
<input id="mobile" class="form-control" placeholder="Mobile Number">
</div>

<div class="col-md-3">
<input id="searchBook" class="form-control" placeholder="Search Book">
</div>

<div class="col-md-3">
<select id="bookSelect" class="form-control"></select>
</div>

</div>

<button class="btn btn-success mt-3" onclick="borrowBook()">Borrow Book</button>

<hr>

<h4>Available Books</h4>
<table class="table table-striped" id="availableTable"></table>

<h4>Borrowed Books</h4>
<table class="table table-striped" id="borrowedTable"></table>

<h4>Delayed Books</h4>
<table class="table table-striped" id="delayedTable"></table>

<h4>Borrow History</h4>
<table class="table table-striped" id="historyTable"></table>

</div>

<script src="script.js"></script>

</body>
</html>
