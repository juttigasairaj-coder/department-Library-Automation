<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACSE Library Pro Dashboard</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
            transition: 0.3s;
        }

        .dark-mode {
            background: #0f172a;
            color: white;
        }

        /* Navbar */
        .navbar {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            padding: 15px;
        }

        .navbar-brand {
            font-weight: 600;
            font-size: 20px;
        }

        /* Cards */
        .card-box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .card-box:hover {
            transform: translateY(-5px);
        }

        .dark-mode .card-box {
            background: #1e293b;
        }

        /* Stats Cards */
        .stat-card {
            padding: 20px;
            border-radius: 15px;
            color: white;
            font-weight: 600;
        }

        .bg1 { background: linear-gradient(45deg, #6366f1, #8b5cf6); }
        .bg2 { background: linear-gradient(45deg, #10b981, #059669); }
        .bg3 { background: linear-gradient(45deg, #f59e0b, #d97706); }
        .bg4 { background: linear-gradient(45deg, #ef4444, #dc2626); }

        /* Inputs */
        .form-control, select {
            border-radius: 10px;
            padding: 10px;
        }

        /* Buttons */
        .btn-custom {
            border-radius: 10px;
            padding: 10px 20px;
            background: #6366f1;
            color: white;
            border: none;
        }

        .btn-custom:hover {
            background: #4f46e5;
        }

        /* Table */
        table {
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: #111827 !important;
            color: white;
            text-align: center;
        }

        td {
            text-align: center;
        }

        /* Toggle */
        .toggle-btn {
            cursor: pointer;
            background: white;
            padding: 5px 10px;
            border-radius: 20px;
        }

        .dark-mode .toggle-btn {
            background: #334155;
            color: white;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark">
    <div class="container-fluid">
        <span class="navbar-brand">🚀 ACSE Library Pro</span>

        <div>
            <span class="toggle-btn me-3" onclick="toggleDark()">🌙 Dark</span>
            <button class="btn btn-light me-2" onclick="history.back()">⬅</button>
            <button class="btn btn-light" onclick="history.forward()">➡</button>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <!-- Stats -->
    <div class="row g-3">
        <div class="col-md-3">
            <div class="stat-card bg1">Total Books <h3 id="totalBooks">0</h3></div>
        </div>
        <div class="col-md-3">
            <div class="stat-card bg2">Available <h3 id="availableCount">0</h3></div>
        </div>
        <div class="col-md-3">
            <div class="stat-card bg3">Borrowed <h3 id="borrowedCount">0</h3></div>
        </div>
        <div class="col-md-3">
            <div class="stat-card bg4">Delayed <h3 id="delayedCount">0</h3></div>
        </div>
    </div>

    <!-- Borrow -->
    <div class="card-box mt-4">
        <h4>Borrow Book</h4>

        <div class="row g-3">
            <div class="col-md-3">
                <input id="facultyName" class="form-control" placeholder="Faculty Name">
            </div>

            <div class="col-md-3">
                <input id="mobile" class="form-control" placeholder="Mobile Number">
            </div>

            <div class="col-md-3">
                <input id="searchBook" class="form-control" placeholder="Search Book">
            </div>

            <div class="col-md-3">
                <select id="bookSelect" class="form-control"></select>
            </div>
        </div>

        <button class="btn-custom mt-3" onclick="borrowBook()">Borrow Book</button>
    </div>

    <!-- Tables -->
    <div class="card-box">
        <h4>Available Books</h4>
        <table class="table table-hover" id="availableTable"></table>
    </div>

    <div class="card-box">
        <h4>Borrowed Books</h4>
        <table class="table table-hover" id="borrowedTable"></table>
    </div>

    <div class="card-box">
        <h4>Delayed Books</h4>
        <table class="table table-hover" id="delayedTable"></table>
    </div>

    <div class="card-box">
        <h4>History</h4>
        <table class="table table-hover" id="historyTable"></table>
    </div>

</div>

<script>
function toggleDark() {
    document.body.classList.toggle("dark-mode");
}

/* Example auto stats update (connect with your data later) */
function updateStats() {
    document.getElementById("totalBooks").innerText = 200;
    document.getElementById("availableCount").innerText = 150;
    document.getElementById("borrowedCount").innerText = 40;
    document.getElementById("delayedCount").innerText = 10;
}

updateStats();
</script>

</body>
</html>
